name: bone_marrow_puncture
display_name: 骨髓穿刺术 (Bone Marrow Puncture)
category: procedural
exam_station: 3
difficulty: advanced
version: 1.0.0
description: 评估骨髓穿刺操作规范性：穿刺点定位、骨穿针垂直进针、抽吸技术
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 23
  name: left_hip
  type: hip
  required: true
- id: 24
  name: right_hip
  type: hip
  required: true
features:
- name: insertion_angle
  description: 骨穿针垂直角度
  type: angle
  weight: 0.3
- name: hand_stability
  description: 操作稳定性
  type: variance
  weight: 0.3
- name: steady_pressure
  description: 持续加压推进
  type: force_consistency
  weight: 0.25
- name: wrist_range
  description: 腕关节活动范围
  type: range
  weight: 0.15
metrics:
- name: angle_score
  display_name: 垂直角度
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
  target: 90
  acceptable_range:
  - 75
  - 105
- name: stability
  display_name: 操作稳定性
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
  target: 95
  acceptable_range:
  - 70
  - 100
- name: pressure_score
  display_name: 加压一致性
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: smoothness
  display_name: 操作流畅性
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.15
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
