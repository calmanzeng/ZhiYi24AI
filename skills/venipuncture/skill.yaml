name: venipuncture
display_name: 静脉穿刺术 (Venipuncture)
category: procedural
exam_station: 3
difficulty: basic
version: 1.0.0
description: 评估静脉穿刺操作规范性：止血带使用、血管选择、进针角度、回血确认
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: false
- id: 14
  name: right_elbow
  type: elbow
  required: false
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 19
  name: left_index
  type: finger
  required: false
- id: 20
  name: right_index
  type: finger
  required: false
features:
- name: needle_angle
  description: 进针角度
  type: angle
  weight: 0.3
- name: hand_stability
  description: 操作手稳定性
  type: variance
  weight: 0.25
- name: smoothness
  description: 动作流畅度
  type: smoothness
  weight: 0.25
- name: fine_motor
  description: 精细运动控制
  type: finger_control
  weight: 0.2
metrics:
- name: angle_score
  display_name: 进针角度
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
  target: 90
  acceptable_range:
  - 70
  - 110
- name: stability
  display_name: 手部稳定性
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.25
  target: 90
  acceptable_range:
  - 70
  - 100
- name: smoothness
  display_name: 动作流畅度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: precision
  display_name: 精准度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
