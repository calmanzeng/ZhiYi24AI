name: oxygen_therapy
display_name: 吸氧术 (Oxygen Therapy)
category: procedural
exam_station: 3
difficulty: basic
version: 1.0.0
description: 评估吸氧操作规范性：流量调节、鼻导管放置、湿化瓶检查、安全操作
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 0
  name: nose
  type: face
  required: true
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: false
- id: 14
  name: right_elbow
  type: elbow
  required: false
features:
- name: hand_face_distance
  description: 手到面部距离(操作范围)
  type: distance
  weight: 0.3
- name: hand_stability
  description: 手部稳定性
  type: variance
  weight: 0.25
- name: movement_smoothness
  description: 动作流畅度
  type: smoothness
  weight: 0.25
- name: elbow_angle
  description: 肘关节角度(操作姿势)
  type: angle
  weight: 0.2
metrics:
- name: positioning
  display_name: 操作位置
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
  target: 85
  acceptable_range:
  - 60
  - 100
- name: stability
  display_name: 手部稳定性
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.25
  target: 90
  acceptable_range:
  - 70
  - 100
- name: smoothness
  display_name: 动作流畅度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: posture
  display_name: 操作姿势
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
