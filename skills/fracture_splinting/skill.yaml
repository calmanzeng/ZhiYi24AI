name: fracture_splinting
display_name: 骨折固定术 (Fracture Splinting)
category: emergency
exam_station: 3
difficulty: intermediate
version: 1.0.0
description: 评估骨折固定操作规范性：搬运姿势、夹板固定、绑带松紧、关节制动
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 25
  name: left_knee
  type: knee
  required: false
- id: 26
  name: right_knee
  type: knee
  required: false
features:
- name: limb_stability
  description: 患肢稳定性
  type: variance
  weight: 0.3
- name: wrapping_pattern
  description: 缠绕模式规律性
  type: periodicity
  weight: 0.25
- name: movement_control
  description: 动作幅度控制
  type: range
  weight: 0.25
- name: hand_distance
  description: 双手距离变化
  type: distance
  weight: 0.2
metrics:
- name: stability
  display_name: 患肢稳定
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
  target: 90
  acceptable_range:
  - 70
  - 100
- name: wrapping
  display_name: 固定包扎
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
  target: 85
  acceptable_range:
  - 60
  - 100
- name: control
  display_name: 幅度控制
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
- name: smoothness
  display_name: 操作流畅度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
